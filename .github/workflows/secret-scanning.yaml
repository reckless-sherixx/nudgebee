name: Secret Scanning

on:
  pull_request: # every PR, regardless of target branch
  push:
    branches: [main, test, prod]
  workflow_dispatch: # manual full-history baseline sweep
    inputs:
      full_history:
        description: 'Scan entire git history (baseline sweep)'
        type: boolean
        default: true

permissions:
  contents: read

env:
  GITLEAKS_VERSION: '8.21.2'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    # Two parallel scans against the same checkout:
    #   secrets        — gitleaks default ruleset (credentials, tokens)
    #   internal-leaks — internal-reference patterns (env-suffixed names,
    #                    internal hostnames); see .gitleaks-internal.toml
    # fail-fast=false so a hit in one config doesn't mask findings in the other.
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: secrets
            file: .gitleaks.toml
            report: gitleaks.sarif
          - name: internal-leaks
            file: .gitleaks-internal.toml
            report: gitleaks-internal.sarif
    name: gitleaks (${{ matrix.config.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need base commit for diff + full history

      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          FULL_HISTORY: ${{ inputs.full_history }}
          CONFIG_FILE: ${{ matrix.config.file }}
          REPORT_FILE: ${{ matrix.config.report }}
        run: |
          set -euo pipefail
          COMMON=(--config "$CONFIG_FILE" --redact --report-format sarif --report-path "$REPORT_FILE" --exit-code 1 --verbose)
          if [ "$EVENT_NAME" = "pull_request" ]; then
            # scan only commits introduced by the PR
            gitleaks git "${COMMON[@]}" --log-opts="${PR_BASE_SHA}..${HEAD_SHA}"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$FULL_HISTORY" = "true" ]; then
            gitleaks git "${COMMON[@]}" # entire history
          else
            # push event: scan the pushed range, falling back to a full scan
            # when github.event.before is the all-zero sha (first push to a branch)
            if [ "$PUSH_BEFORE_SHA" = "0000000000000000000000000000000000000000" ] || [ -z "$PUSH_BEFORE_SHA" ]; then
              gitleaks git "${COMMON[@]}"
            else
              gitleaks git "${COMMON[@]}" --log-opts="${PUSH_BEFORE_SHA}..${HEAD_SHA}"
            fi
          fi

      - name: Upload findings report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report-${{ matrix.config.name }}
          path: ${{ matrix.config.report }}
          if-no-files-found: ignore
