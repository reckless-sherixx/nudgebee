name: llm-server CI

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
    paths:
      - llm/llm-server/**
      - .github/workflows/llm-server.yaml
      - deploy/kubernetes/llm-server/**

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Go Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image_tag: ${{ steps.set-tag.outputs.IMAGE_TAG }}

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set Image Tag
        id: set-tag
        run: |
          IMAGE_TAG="$(date +'%Y%m%d%H%M00')-$(git rev-parse --short HEAD)"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: llm/llm-server/go.sum

      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('llm/llm-server/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          working-directory: llm/llm-server
          only-new-issues: true
          args: --timeout 20m

      # -race needs cgo + a C compiler. The self-hosted runner image is minimal
      # and may ship without gcc, so install it before the race-enabled run.
      - name: Install C toolchain (for -race)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc libc6-dev

      # Unit suite. Tests that need a live Postgres metastore / Clickhouse
      # warehouse / external credentials skip themselves cleanly via the
      # internal/testenv helpers (testenv.RequireMetastore / RequireWarehouse /
      # RequireEnv), so this runs hermetically on a bare runner. Making those
      # skips real test coverage (throwaway containers) is tracked in #31114.
      - name: Run unit tests
        working-directory: ./api-server/services
        # setup-go leaves CGO_ENABLED unset; -race requires cgo, so enable it.
        env:
          CGO_ENABLED: "1"
        run: go test -race ./...

      # Compile-only gate for the integration-tagged tests
      # (//go:build relay_integration | recommendation_integration). They need
      # live infra CI does not have, so we do NOT run them -- but `go vet`
      # type-checks every file, including the tagged ones, without executing any
      # binary, so build breakage in them still surfaces on the PR.
      - name: Build integration-tagged tests (compile-only)
        # Run even if the unit-test step failed, so compile breakage is always
        # reported instead of being masked by an unrelated test failure.
        if: ${{ !cancelled() }}
        working-directory: ./api-server/services
        run: go vet -tags "relay_integration recommendation_integration" ./...
