name: Migrations Validate

# OSS-side migration validation. Catches issues BEFORE they land on main:
# wrong filename, missing .down.sql pair, non-monotonic timestamps, SQL
# that doesn't apply against a fresh Postgres.
#
# Deliberately scoped to validation only — no deploy, no image push,
# no kubectl. The migration image itself is built/published by
# release.yaml (tagged) and edge.yaml (rolling). OSS users run the
# image against their own DB via the `migrations` chart or umbrella
# chart's post-install hook.
#
# For ops-recovery patterns (apply / force / backfill_versions /
# apply_from), see api-server/migrations/README.md — those are
# operator commands, not a CI workflow.

on:
  pull_request:
    branches: [main]
    paths:
      - 'api-server/migrations/**'
      - '.github/workflows/migrations.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint migrations
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          # Need main for the monotonic-timestamp check.
          fetch-depth: 0

      - name: Verify filename convention + up/down pair existence
        run: |
          set -euo pipefail
          MIGRATIONS_DIR=api-server/migrations/migrations/app
          PATTERN='^[0-9]{13,}_V[0-9]+_[a-z0-9_]+\.(up|down)\.sql$'
          FAILED=0

          # All checks scoped to files added/modified in THIS PR.
          # Pre-existing files on main that don't match the canonical pattern or
          # lack a .down.sql pair are accepted (OSS-prep dropped some siblings
          # leaving the standing state inconsistent). Relitigating those isn't
          # this check's job; catching regressions in the PR is.
          mapfile -t pr_files < <(git diff --name-only --diff-filter=AM origin/main..HEAD -- "$MIGRATIONS_DIR" | grep -E '\.sql$' || true)

          # 1. Every file added by this PR matches the canonical pattern
          for f in "${pr_files[@]:-}"; do
            [ -z "$f" ] && continue
            base=$(basename "$f")
            if ! [[ "$base" =~ $PATTERN ]]; then
              echo "::error file=${f}::filename does not match ${PATTERN}"
              FAILED=1
            fi
          done

          # 2. Every .up.sql added by this PR has a matching .down.sql with the same stem
          for up in "${pr_files[@]:-}"; do
            [ -z "$up" ] && continue
            [[ "$up" == *.up.sql ]] || continue
            down="${up%.up.sql}.down.sql"
            if [ ! -f "$down" ]; then
              echo "::error file=${up}::missing matching .down.sql (expected ${down})"
              FAILED=1
            fi
          done

          # 3. No NEW *timestamp* collisions. golang-migrate keys on the leading
          # integer (timestamp), not the V<N> label — so a duplicate V<N> is
          # cosmetic (it makes `migrate up` output less readable but doesn't
          # change behavior). A duplicate *timestamp*, however, IS a silent-skip
          # bug: the second file with the same version never gets registered.
          #
          # Scoped to PR additions for the same reason as the other checks:
          # OSS-prep has accumulated several V<N> collisions over its history
          # (cycle-2 backfills that brought EE migrations whose V<N> was
          # already in use, e.g. three files now share the V742 label). Those
          # are accepted by golang-migrate; relitigating them isn't this
          # check's job.
          mapfile -t added_files < <(git diff --name-only --diff-filter=A origin/main..HEAD -- "$MIGRATIONS_DIR" | grep -E '\.up\.sql$' || true)
          if [ "${#added_files[@]}" -gt 0 ]; then
            added_ts=$(printf '%s\n' "${added_files[@]}" | sed -E 's@.*/([0-9]+)_V.*@\1@' | sort -u)
            all_dupe_ts=$(find "$MIGRATIONS_DIR" -maxdepth 1 -name '*.up.sql' \
                          | sed -E 's@.*/([0-9]+)_V.*@\1@' \
                          | sort | uniq -d)
            new_collisions=$(comm -12 <(echo "$added_ts") <(echo "$all_dupe_ts"))
            if [ -n "$new_collisions" ]; then
              echo "::error::timestamp collision introduced by this PR (would be silent-skipped by golang-migrate):"
              echo "$new_collisions" | sed 's/^/  /' >&2
              FAILED=1
            fi
          fi

          [ "$FAILED" -eq 0 ] && echo "✓ filename + pair checks clean"
          exit "$FAILED"

      - name: Warn on non-monotonic timestamps vs main
        run: |
          set -euo pipefail
          MIGRATIONS_DIR=api-server/migrations/migrations/app

          # golang-migrate's tracker is single-row "current version". A new
          # migration whose leading integer is LOWER than `max(version)
          # already applied` is silently skipped by that tracker. For a brand-
          # new migration (someone forgot to bump the timestamp), that's a bug
          # we want loud. For a *backfill* — bringing an EE migration whose
          # timestamp predates an OSS-prep drop — that's intentional, and the
          # operational fix is documented in api-server/migrations/README.md
          # (the `apply_from <ts>` recovery flow).
          #
          # We can't reliably tell brand-new-bug from intentional-backfill at
          # PR time, so this check warns rather than fails. Reviewer judgment
          # still required: confirm the timestamp predates main's max on
          # *purpose* (sync cycle restoring a dropped EE migration), not by
          # accident (locally generated migration on a stale branch).
          existing_max=$(git show "origin/main:${MIGRATIONS_DIR}" 2>/dev/null \
            | grep -oE '^[0-9]{13,}' | sort -nu | tail -1 || echo "0")
          [ -n "$existing_max" ] || existing_max=0

          warnings=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ -e "$f" ] || continue
            [[ "$f" == *.up.sql ]] || continue
            ts=$(basename "$f" | grep -oE '^[0-9]+')
            if [ -n "$ts" ] && [ "$ts" -le "$existing_max" ]; then
              echo "::warning file=${f}::timestamp ${ts} <= main's max ${existing_max} — will be silently skipped by golang-migrate on installs already past ${existing_max}. Confirm this is an intentional backfill (cycle-sync restoring a dropped EE migration). If accidental, regenerate the timestamp."
              warnings=$((warnings + 1))
            fi
          done < <(git diff --name-only --diff-filter=A origin/main..HEAD -- "$MIGRATIONS_DIR")

          if [ "$warnings" -eq 0 ]; then
            echo "✓ monotonic timestamps (no backfills)"
          else
            echo "⚠ $warnings backfill timestamp(s) flagged — verify they're intentional"
          fi

      - name: Refuse CREATE INDEX CONCURRENTLY without --migrate:no-transaction
        run: |
          set -euo pipefail
          MIGRATIONS_DIR=api-server/migrations/migrations/app

          # golang-migrate wraps each file in a transaction by default, and
          # CREATE INDEX CONCURRENTLY can't run inside one. The fix is to
          # add `-- migrate:no-transaction` as the first line of the file.
          # Easier to catch here than to debug a stuck `dirty=true` tracker
          # in production. (See api-server/migrations/README.md.)
          #
          # Scoped to PR-added files for the same reason as the other lint
          # checks above: standing OSS state is accepted. Comments are
          # stripped before matching (a file may legitimately *mention* the
          # phrase in a `-- IMPORTANT: do not use ...` warning).
          FAILED=0
          mapfile -t pr_files < <(git diff --name-only --diff-filter=AM origin/main..HEAD -- "$MIGRATIONS_DIR" | grep -E '\.sql$' || true)
          for f in "${pr_files[@]:-}"; do
            [ -z "$f" ] && continue
            [ -f "$f" ] || continue
            # Strip SQL line comments (lines starting with --) before matching.
            if grep -vE '^\s*--' "$f" | grep -qiE 'CREATE\s+INDEX\s+CONCURRENTLY'; then
              if ! head -1 "$f" | grep -qE '^--\s*migrate:no-transaction'; then
                echo "::error file=${f}::CREATE INDEX CONCURRENTLY requires '-- migrate:no-transaction' as the first line"
                FAILED=1
              fi
            fi
          done

          [ "$FAILED" -eq 0 ] && echo "✓ no CONCURRENTLY-without-no-transaction violations"
          exit "$FAILED"

  dry-run:
    name: Dry-run migrations against ephemeral Postgres
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          # User MUST be 'postgres' (not 'nudgebee') to match production.
          # Reason: V173/V174 mix qualified DROPs (`"public"."matview"`) with
          # unqualified CREATEs (`create materialized view matview`). The
          # default search_path is `"$user", public`. If a schema named
          # `$user` exists (which 'nudgebee' does, because we create it for
          # the migration tracker), unqualified CREATEs land in `nudgebee`,
          # then qualified DROPs look in `public` and fail.
          # Production runs as `postgres` user with no `postgres` schema, so
          # search_path resolves to public only and the pattern works.
          # See the comment in api-server/migrations/run-migrations.sh
          # mentioning V174's "qualified-vs-unqualified DROP/CREATE pair".
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nudgebee_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Matches the URL shape that run-migrations.sh consumes in production.
      APP_DATABASE_URL: postgres://postgres:postgres@localhost:5432/nudgebee_test?sslmode=disable
      GOLANG_MIGRATE_VERSION: v4.17.0
    steps:
      - uses: actions/checkout@v4

      - name: Install golang-migrate ${{ env.GOLANG_MIGRATE_VERSION }}
        run: |
          set -euo pipefail
          curl -fsSL --retry 5 \
            "https://github.com/golang-migrate/migrate/releases/download/${GOLANG_MIGRATE_VERSION}/migrate.linux-amd64.deb" \
            -o /tmp/migrate.deb
          sudo dpkg -i /tmp/migrate.deb
          migrate -version

      - name: Install psql (postgresql-client)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Wait for Postgres
        run: |
          for i in {1..20}; do
            pg_isready -h localhost -p 5432 && break
            sleep 1
          done

      - name: Create nudgebee schema (tracker target)
        run: |
          psql "$APP_DATABASE_URL" -v ON_ERROR_STOP=1 -c "CREATE SCHEMA IF NOT EXISTS nudgebee;"

      - name: migrate up
        run: |
          set -euo pipefail
          # Single `migrate up`, same as production's run-migrations.sh.
          # Service-container user/schema setup (POSTGRES_USER=postgres) is what
          # makes V173/V174's qualified-DROP + unqualified-CREATE pattern apply
          # cleanly — see the comment on the service container above.
          MIGRATE_URL="${APP_DATABASE_URL}&x-migrations-table=%22nudgebee%22.%22schema_migrations%22&x-migrations-table-quoted=true"
          migrate -path api-server/migrations/migrations/app -database "$MIGRATE_URL" up

      - name: Show applied tracker state
        run: |
          psql "$APP_DATABASE_URL" -tA \
            -c "SELECT version, dirty FROM nudgebee.schema_migrations;"
