name: workflow-server CI

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
    paths:
      - runbook-server/**
      - .github/workflows/workflow-server.yaml
      - deploy/kubernetes/workflow-server/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
    strategy:
      matrix:
        go-version: ["1.26.x"]

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: ./runbook-server/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          working-directory: ./runbook-server
          args: --timeout 20m

      # -race needs cgo + a C compiler. The self-hosted runner image is minimal
      # and may ship without gcc, so install it before the race-enabled run.
      - name: Install C toolchain (for -race)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc libc6-dev

      # Unit suite. Tests that need a live backend (LLM / cloud server / cluster
      # credentials / Postgres / Temporal) skip themselves cleanly via the
      # testutils.RequireEnv guard and per-test TEST_* checks, so this runs
      # hermetically on a bare runner. The Postgres+Temporal integration tier
      # (docker-compose.test.yml, `make integration-test`) stays a separate,
      # opt-in concern.
      - name: Run unit tests
        working-directory: ./runbook-server
        # setup-go leaves CGO_ENABLED unset; -race requires cgo, so enable it.
        env:
          CGO_ENABLED: "1"
        run: go test -race ./...
