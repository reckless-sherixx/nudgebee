name: ticket-server CI

on:
  workflow_dispatch:
  pull_request:
    branches: ['main']
    paths:
      - ticket-server/**
      - .github/workflows/ticket-server.yaml
      - deploy/kubernetes/ticket-server/**

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        go-version: ['1.26.x']

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: ticket-server/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          working-directory: ./ticket-server
          args: --timeout 20m
